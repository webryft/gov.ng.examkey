<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-adsense-account" content="ca-pub-6924280031768875">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Government Exam Key - Access</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#ffffff;
color:#222;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
text-align:center;
padding:40px 20px 20px;
font-size:28px;
font-weight:600;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

header img{
width:30px;
height:30px;
}

.container{
display:grid;
gap:40px;
padding:40px;
max-width:1100px;
margin:auto;
}

.card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
animation:float 4s ease-in-out infinite;
transition:transform .3s ease;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
border-radius:15px;
margin-bottom:20px;
}

.btn{
padding:12px 20px;
border:none;
border-radius:30px;
background:#111;
color:#fff;
cursor:pointer;
font-size:15px;
transition:.3s ease;
animation:btnFloat 3s ease-in-out infinite;
}

.btn:hover{
background:#444;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

@keyframes btnFloat{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-4px);}
}

/* Loading Overlay */
.loading{
position:fixed;
inset:0;
background:#ffffff;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:500;
opacity:0;
pointer-events:none;
transition:.3s ease;
}

.loading.active{
opacity:1;
pointer-events:auto;
}

footer{
text-align:center;
padding:30px 10px;
font-size:13px;
color:#999;
margin-top:auto;
}
</style>
</head>

<body>

<header>
Government Exam Key
<img src="icon.png" alt="icon">
</header>

<div class="container">

<div class="card">
<img src="image.jpg">
<button class="btn" onclick="openPage('waec.html')">Open Key</button>
</div>

<div class="card">
<img src="image1.jpg">
<button class="btn" onclick="openPage('jamb.html')">Open Key</button>
</div>

<div class="card">
<img src="image2.jpg">
<button class="btn" onclick="openPage('neco.html')">Open Key</button>
</div>

<div class="card">
<img src="image3.jpg">
<button class="btn" onclick="openPage('nabtab.html')">Open Key</button>
</div>

</div>

<div class="loading" id="loading">
Opening...
</div>

<footer>
copyright ©️ 2026 gov.ng
</footer>

<script>  
function openPage(page){
const loading=document.getElementById("loading");
loading.classList.add("active");

setTimeout(()=>{
window.location.href=page;
},1000);
}
</script>

</body>
</html>
